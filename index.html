<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDR Admin | Advanced Power Portal 2026</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;600;900&display=swap');

        :root { 
            --gold: #c5a059; 
            --deep-gold: #996515;
            --accent-orange: #ff5f1f;
            --bg-base: #050505;
            --glass: rgba(15, 15, 15, 0.9);
            --card-bg: rgba(255, 255, 255, 0.03);
            --text-main: #f0f0f0;
            --text-dim: #aaa;
            --border: rgba(255,255,255,0.08);
            --input-bg: #111;
        }
        
        body {
            margin: 0; font-family: 'Outfit', sans-serif; 
            background: var(--bg-base); color: var(--text-main); height: 100vh; overflow: hidden;
            transition: 0.5s;
        }

        .app-shell { display: flex; height: 100vh; width: 100vw; gap: 15px; padding: 15px; box-sizing: border-box; }
        .nav-sidebar { width: 280px; background: var(--glass); border-radius: 30px; border: 1px solid var(--border); display: flex; flex-direction: column; padding: 30px; backdrop-filter: blur(25px); }
        .nav-item { padding: 14px; margin-bottom: 8px; border-radius: 15px; cursor: pointer; transition: 0.3s; color: var(--text-dim); display: flex; align-items: center; gap: 12px; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; }
        .nav-item:hover, .nav-item.active { background: var(--input-bg); color: var(--gold); transform: translateX(5px); border: 1px solid var(--gold); }

        .main-content { flex: 1; background: var(--glass); border-radius: 30px; border: 1px solid var(--border); overflow-y: auto; padding: 40px; backdrop-filter: blur(25px); position: relative; }
        .page-layer { display: none; animation: slideUp 0.5s ease-out; }
        .page-layer.active { display: block; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .glass-card { background: var(--card-bg); padding: 30px; border-radius: 25px; border: 1px solid var(--border); margin-bottom: 20px; }
        .form-module { display: none; }
        .form-module.active { display: block; }
        .module-indicator { display: flex; gap: 10px; margin-bottom: 30px; }
        .step-dot { flex: 1; height: 4px; background: var(--border); border-radius: 2px; }
        .step-dot.active { background: var(--gold); box-shadow: 0 0 10px var(--gold); }

        label { display: block; font-size: 0.7rem; font-weight: 900; margin-bottom: 8px; color: var(--gold); text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 15px; margin-bottom: 20px; background: var(--input-bg); border: 1px solid var(--border); color: var(--text-main); border-radius: 12px; font-family: inherit; box-sizing: border-box; }

        .btn { padding: 18px 35px; border: none; border-radius: 50px; font-weight: 900; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; background: linear-gradient(135deg, var(--gold), var(--deep-gold)); color: #fff; width: 100%; }
        
        #ai-log { height: 200px; overflow-y: auto; background: rgba(0,0,0,0.3); border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid var(--border); font-size: 0.9rem; }
        .ai-msg { color: var(--gold); margin-bottom: 10px; }
        .user-msg { color: #fff; margin-bottom: 10px; text-align: right; }

        .hidden { display: none !important; }
        .link-pill { background: var(--input-bg); padding: 12px; border-radius: 10px; margin-bottom: 8px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; }
    </style>
</head>
<body data-theme="dark">

    <div id="login-layer" style="position:fixed; inset:0; background:#000; z-index:9999; display:flex; align-items:center; justify-content:center; text-align:center;">
        <div class="glass-card" style="width: 350px;">
            <h1 style="letter-spacing: 5px; font-weight: 200;">SDR <span style="font-weight: 900;">REC</span></h1>
            <input type="password" id="pass-key" placeholder="ACCESS KEY" style="text-align: center;">
            <button class="btn" onclick="authenticate()">Unleash Power</button>
        </div>
    </div>

    <div class="app-shell hidden" id="portal-shell">
        <nav class="nav-sidebar">
            <h2 style="color: var(--gold); text-align: center; letter-spacing: 3px;">SDR AFRICA</h2>
            <div class="nav-item active" onclick="showPage('home')">🏠 Hub</div>
            <div class="nav-item" onclick="showPage('upload')">🚀 Release</div>
            <div class="nav-item" onclick="showPage('promote')">📣 Promo</div>
            <div class="nav-item" onclick="showPage('ai')">🤖 AI Concierge</div>
        </nav>

        <main class="main-content">
            <div id="page-home" class="page-layer active">
                <h2>Artist Dashboard</h2>
                <div class="glass-card">
                    <h3>Status: <span style="color: var(--gold);">2026 Sync Active</span></h3>
                    <div style="display: flex; gap: 20px; margin-top: 20px;">
                        <div style="flex: 1; text-align: center;"><h1>14</h1><small>Live Tracks</small></div>
                        <div style="flex: 1; text-align: center; border-left: 1px solid var(--border);"><h1>R2.4k</h1><small>Royalties</small></div>
                    </div>
                </div>
            </div>

            <div id="page-upload" class="page-layer">
                <h2>Release Push</h2>
                <div class="module-indicator">
                    <div class="step-dot active" id="dot-1"></div>
                    <div class="step-dot" id="dot-2"></div>
                </div>
                <div class="glass-card">
                    <div class="form-module active" id="module-a">
                        <label>Catalog Number</label><input type="text" id="m-cat" placeholder="SDR001">
                        <label>Primary Artist</label><input type="text" id="m-artist" placeholder="Nontomby">
                        <label>Track Title</label><input type="text" id="m-title" placeholder="Impumelelo">
                        <button class="btn" onclick="nextModule(2)">Next: Metadata Details</button>
                    </div>
                    <div class="form-module" id="module-b">
                        <label>Mix Name</label><input type="text" id="m-mix" placeholder="Original Mix">
                        <label>Composers (Full Names)</label><input type="text" id="m-composer" placeholder="Sakhile Chiliza">
                        <label>Genre</label>
                        <select id="m-genre"><option>Afro House</option><option>Amapiano</option><option>Deep House</option></select>
                        <div style="display: flex; gap: 10px;">
                            <button class="btn" style="background:#333;" onclick="nextModule(1)">Back</button>
                            <button class="btn" onclick="finalizeRelease()">Generate CSV</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="page-promote" class="page-layer">
                <h2>Smart Link Scraper</h2>
                <div class="glass-card">
                    <label>Spotify Link</label>
                    <input type="text" id="sp-url" placeholder="Paste Spotify URL...">
                    <button class="btn" id="scrape-btn" onclick="runScraper()">Generate Multi-Links</button>
                    <div id="link-results" style="margin-top: 20px;"></div>
                </div>
            </div>

            <div id="page-ai" class="page-layer">
                <h2>AI Label Manager</h2>
                <div class="glass-card">
                    <div id="ai-log">
                        <div class="ai-msg">SDR AI: Ready to assist with your release strategy.</div>
                    </div>
                    <input type="text" id="ai-query" placeholder="Ask about SAMRO, Promo, or Trends...">
                    <button class="btn" id="ai-exec" onclick="talkToAI()">Send to Brain</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        const CONFIG = {
            SDR_PASS: "SDR2026",
            OPENAI_KEY: "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"
        };

        function authenticate() {
            if(document.getElementById('pass-key').value === CONFIG.SDR_PASS) {
                document.getElementById('login-layer').classList.add('hidden');
                document.getElementById('portal-shell').classList.remove('hidden');
            } else { alert("Access Denied"); }
        }

        function showPage(pageId) {
            document.querySelectorAll('.page-layer').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            const navItems = document.querySelectorAll('.nav-item');
            navItems.forEach(item => {
                if(item.textContent.toLowerCase().includes(pageId)) item.classList.add('active');
            });
        }

        function nextModule(step) {
            document.querySelectorAll('.form-module').forEach(m => m.classList.remove('active'));
            document.getElementById('module-' + (step === 2 ? 'b' : 'a')).classList.add('active');
            document.getElementById('dot-2').classList.toggle('active', step === 2);
        }

        async function talkToAI() {
            const input = document.getElementById('ai-query');
            const log = document.getElementById('ai-log');
            const btn = document.getElementById('ai-exec');
            const userMsg = input.value;
            if(!userMsg) return;

            log.innerHTML += `<div class="user-msg">User: ${userMsg}</div>`;
            input.value = "";
            btn.innerText = "THINKING...";

            try {
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${CONFIG.OPENAI_KEY}` },
                    body: JSON.stringify({
                        model: "gpt-3.5-turbo",
                        messages: [{role: "system", content: "You are the SDR Elite AI for Soul Dust Records. Help with Afro House distribution and metadata."}, {role: "user", content: userMsg}]
                    })
                });
                const data = await response.json();
                log.innerHTML += `<div class="ai-msg">SDR AI: ${data.choices[0].message.content}</div>`;
                log.scrollTop = log.scrollHeight;
            } catch (e) { log.innerHTML += `<div style="color:red">Error connecting to AI brain.</div>`; }
            btn.innerText = "SEND TO BRAIN";
        }

        async function runScraper() {
            const url = document.getElementById('sp-url').value;
            const resDiv = document.getElementById('link-results');
            if(!url.includes('spotify')) return alert("Enter a valid Spotify URL");
            
            document.getElementById('scrape-btn').innerText = "SCANNING...";
            try {
                const response = await fetch(`https://api.song.link/v1-alpha.1/links?url=${encodeURIComponent(url)}`);
                const data = await response.json();
                resDiv.innerHTML = "";
                ['appleMusic', 'youtube', 'deezer', 'tidal'].forEach(p => {
                    if(data.linksByPlatform[p]) {
                        resDiv.innerHTML += `<div class="link-pill"><span>${p.toUpperCase()}</span><a href="${data.linksByPlatform[p].url}" target="_blank" style="color:var(--gold)">LINK</a></div>`;
                    }
                });
            } catch (e) { alert("Links not found."); }
            document.getElementById('scrape-btn').innerText = "GENERATE MULTI-LINKS";
        }

        function finalizeRelease() {
            const headers = "Label,Catalog Number,Track Number,Release Title,Artist,Featured Artist,Remixer,Title,Mix,Duration,Authors,Composers,Publisher,Genre,ISRC";
            const row = `Soul Dust Records,${document.getElementById('m-cat').value},1,${document.getElementById('m-title').value},${document.getElementById('m-artist').value},,,${document.getElementById('m-title').value},${document.getElementById('m-mix').value},05:00:00,,${document.getElementById('m-composer').value},SDR Publishing,${document.getElementById('m-genre').value},`;
            
            const csvContent = "data:text/csv;charset=utf-8," + headers + "\n" + row;
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `SDR_Metadata_${document.getElementById('m-title').value}.csv`);
            document.body.appendChild(link);
            link.click();
            alert("Metadata file exported for distribution!");
        }
    </script>
</body>
</html>
