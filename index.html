<!DOCTYPE html>
<html>
<head>
  <title>SDR Portal</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    body {
      background: linear-gradient(#3b2a1a, #2b1d13);
      color: white;
      font-family: sans-serif;
      padding: 20px;
    }
    .card {
      background: #4a3223;
      padding: 20px;
      border-radius: 12px;
      margin-top: 20px;
    }
    button {
      padding: 10px;
      margin-top: 10px;
      width: 100%;
    }
  </style>
</head>

<body>

<h1>Soul Dust Records Portal</h1>

<div id="login">
  <button onclick="loginGoogle()">Login with Google</button>
</div>

<div id="app" style="display:none;">
  <div class="card">
    <h3>Upload Track (SDR001)</h3>
    <input type="file" id="file"/>
    <button onclick="upload()">Upload</button>
  </div>

  <div class="card">
    <h3>My Submissions</h3>
    <div id="list"></div>
  </div>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://tjebjlhgnhogkipzpbna.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRqZWJqbGhnbmhvZ2tpcHpwYm5hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwMDc2MTMsImV4cCI6MjA5MzU4MzYxM30.MYCp9CEqpNLMvPxFMU7RX6hUy1ZapxTBbDdI8MCzQxA"
);

let user = null;

// 🔐 Google Login
async function loginGoogle() {
  await supabase.auth.signInWithOAuth({
    provider: "google"
  });
}

// Check session
supabase.auth.getSession().then(({data})=>{
  if(data.session){
    user = data.session.user;
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
    load();
  }
});

// 📂 Upload (temporary)
async function upload() {
  const file = document.getElementById("file").files[0];

  if(!file){
    alert("Select a file first");
    return;
  }

  const link = "pending-upload";

  await supabase.from("releases").insert([
    { user_id: user.id, file_url: link, status: "pending" }
  ]);

  alert("Uploaded!");
  load();
}

// 📊 Load ONLY your data
async function load(){
  const {data} = await supabase
    .from("releases")
    .select("*")
    .eq("user_id", user.id);

  document.getElementById("list").innerHTML =
    data.map(r => `<p>${r.file_url} - ${r.status}</p>`).join("");
}
</script>
