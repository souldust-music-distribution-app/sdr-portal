<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDR Elite | Advanced Power Portal 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;600;900&display=swap');

        :root { 
            --gold: #c5a059; 
            --deep-gold: #996515;
            --accent-orange: #ff5f1f;
            --bg-base: #fdfdfd;
            --glass: rgba(255, 255, 255, 0.85);
            --card-bg: rgba(255, 255, 255, 0.6);
            --text-main: #1a1a1a;
            --text-dim: #666;
            --border: rgba(0,0,0,0.05);
            --input-bg: #ffffff;
        }

        [data-theme="dark"] {
            --bg-base: #050505;
            --glass: rgba(15, 15, 15, 0.9);
            --card-bg: rgba(255, 255, 255, 0.03);
            --text-main: #f0f0f0;
            --text-dim: #aaa;
            --border: rgba(255,255,255,0.08);
            --input-bg: #111;
        }
        
        body {
            margin: 0; font-family: 'Outfit', sans-serif; 
            background: var(--bg-base); 
            background-size: cover; color: var(--text-main); height: 100vh; overflow: hidden;
            transition: 0.5s;
        }

        .app-shell { display: flex; height: 100vh; width: 100vw; gap: 15px; padding: 15px; box-sizing: border-box; }
        .nav-sidebar { width: 280px; background: var(--glass); border-radius: 30px; border: 1px solid var(--border); display: flex; flex-direction: column; padding: 30px; backdrop-filter: blur(25px); }
        .nav-item { padding: 14px; margin-bottom: 8px; border-radius: 15px; cursor: pointer; transition: 0.3s; color: var(--text-dim); display: flex; align-items: center; gap: 12px; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; }
        .nav-item:hover, .nav-item.active { background: var(--input-bg); color: var(--gold); transform: translateX(5px); }

        .main-content { flex: 1; background: var(--glass); border-radius: 30px; border: 1px solid var(--border); overflow-y: auto; padding: 40px; backdrop-filter: blur(25px); position: relative; }
        .page-layer { display: none; animation: slideUp 0.5s ease-out; }
        .page-layer.active { display: block; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .glass-card { background: var(--card-bg); padding: 30px; border-radius: 25px; border: 1px solid var(--border); margin-bottom: 20px; }
        .form-module { display: none; }
        .form-module.active { display: block; }
        .module-indicator { display: flex; gap: 10px; margin-bottom: 30px; }
        .step-dot { flex: 1; height: 4px; background: var(--border); border-radius: 2px; }
        .step-dot.active { background: var(--gold); box-shadow: 0 0 10px var(--gold); }

        label { display: block; font-size: 0.7rem; font-weight: 900; margin-bottom: 8px; color: var(--gold); text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 15px; margin-bottom: 20px; background: var(--input-bg); border: 1px solid var(--border); color: var(--text-main); border-radius: 12px; font-family: inherit; box-sizing: border-box; }

        .btn { padding: 18px 35px; border: none; border-radius: 50px; font-weight: 900; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; background: linear-gradient(135deg, var(--gold), var(--deep-gold)); color: #fff; }
        .btn-outline { background: transparent; border: 1px solid var(--gold); color: var(--gold); }
        .theme-toggle { position: fixed; top: 30px; right: 30px; width: 50px; height: 50px; background: var(--glass); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid var(--border); z-index: 1001; }
        .ai-bot { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.2); z-index: 1000; }
        .hidden { display: none !important; }
        .link-pill { background: var(--input-bg); padding: 12px; border-radius: 10px; margin-bottom: 8px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; }
    </style>
</head>
<body data-theme="dark">

    <div class="theme-toggle" onclick="toggleTheme()">🌓</div>
    <div class="ai-bot" onclick="triggerAI()">🤖</div>

    <div id="login-layer" style="position:fixed; inset:0; background:var(--bg-base); z-index:9999; display:flex; align-items:center; justify-content:center; text-align:center;">
        <div class="glass-card" style="width: 350px;">
            <h1 style="letter-spacing: 5px; font-weight: 200;">SDR <span style="font-weight: 900;">ELITE</span></h1>
            <input type="password" id="pass-key" placeholder="ACCESS KEY" style="text-align: center;">
            <button class="btn" style="width: 100%;" onclick="authenticate()">Unleash Power</button>
        </div>
    </div>

    <div class="app-shell hidden" id="portal-shell">
        <nav class="nav-sidebar">
            <h2 style="color: var(--gold); text-align: center;">SDR</h2>
            <div class="nav-item active" onclick="showPage('home')">🏠 Hub</div>
            <div class="nav-item" onclick="showPage('upload')">🚀 New Release</div>
            <div class="nav-item" onclick="showPage('promote')">📣 Promo Tools</div>
            <div class="nav-item" onclick="showPage('dashboard')">📈 Data</div>
            <div style="margin-top: auto;">
                <div class="nav-item" style="color: var(--accent-orange);" onclick="showPage('admin')">👑 Admin</div>
            </div>
        </nav>

        <main class="main-content">
            <div id="page-home" class="page-layer active">
                <h2>Elite Dashboard</h2>
                <div class="glass-card">
                    <h3>Current Status: <span style="color: var(--gold);">Syncing 2026 Catalog</span></h3>
                    <div style="display: flex; gap: 20px; margin-top: 20px;">
                        <div style="flex: 1; text-align: center;"><h1>14</h1><small>Tracks Live</small></div>
                        <div style="flex: 1; text-align: center; border-left: 1px solid var(--border);"><h1>R2.4k</h1><small>Est. Royalties</small></div>
                    </div>
                </div>
            </div>

            <div id="page-upload" class="page-layer">
                <h2>Release Push</h2>
                <div class="module-indicator">
                    <div class="step-dot active" id="dot-1"></div>
                    <div class="step-dot" id="dot-2"></div>
                    <div class="step-dot" id="dot-3"></div>
                </div>
                <div class="glass-card">
                    <div class="form-module active" id="module-a">
                        <label>Primary Artist</label><input type="text" id="meta-artist" placeholder="Nontomby">
                        <label>Featured Artist</label><input type="text" id="meta-feat" placeholder="Niipseedadust">
                        <button class="btn" onclick="nextModule(2)">Next: Track Details</button>
                    </div>
                    <div class="form-module" id="module-b">
                        <label>Track Title</label><input type="text" id="meta-title" placeholder="Impumelelo">
                        <label>Genre</label>
                        <select id="meta-genre"><option>Afro House</option><option>Amapiano</option></select>
                        <label>Composers (Legal Names)</label><textarea id="meta-legal" placeholder="Sakhile Chiliza, Nontombi Thabile Blose"></textarea>
                        <div style="display:flex; gap:10px;">
                            <button class="btn btn-outline" onclick="nextModule(1)">Back</button>
                            <button class="btn" onclick="nextModule(3)">Next: Audio Assets</button>
                        </div>
                    </div>
                    <div class="form-module" id="module-c">
                        <label>Master WAV File</label><input type="file">
                        <div style="background: rgba(0,255,0,0.05); padding: 15px; border-radius: 10px; margin-bottom: 20px;">
                            <small>✅ Metadata validated for Believe/Static Plastic.</small>
                        </div>
                        <div style="display:flex; gap:10px;">
                            <button class="btn btn-outline" onclick="nextModule(2)">Back</button>
                            <button class="btn" onclick="finalizeRelease()">Generate & Sync CSV</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="page-promote" class="page-layer">
                <h2>Smart Link Pro</h2>
                <div class="glass-card">
                    <label>Paste Spotify Release Link</label>
                    <input type="text" id="sp-input" placeholder="https://open.spotify.com/track/...">
                    <button class="btn" id="scrape-btn" onclick="generateSmartLink()">Generate Multi-Store Link</button>
                    <div id="link-results" class="hidden" style="margin-top: 30px;"></div>
                </div>
            </div>

            <div id="page-dashboard" class="page-layer"><h2>Analytics</h2><div class="glass-card">Believe Backstage Sync Active.</div></div>
        </main>
    </div>

    <script>
        const CONFIG = {
            SDR_PASS: "SDR2026",
            OPENAI_KEY: "YOUR_KEY_HERE" // Add your OpenAI key to make AI talk back
        };

        function toggleTheme() {
            const body = document.body;
            body.setAttribute('data-theme', body.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
        }

        function authenticate() {
            if(document.getElementById('pass-key').value === CONFIG.SDR_PASS) {
                document.getElementById('login-layer').classList.add('hidden');
                document.getElementById('portal-shell').classList.remove('hidden');
            } else { alert("Access Denied"); }
        }

        function showPage(pageId) {
            document.querySelectorAll('.page-layer').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function nextModule(step) {
            document.querySelectorAll('.form-module').forEach(m => m.classList.remove('active'));
            document.querySelectorAll('.step-dot').forEach(d => d.classList.remove('active'));
            const modules = ['a', 'b', 'c'];
            document.getElementById('module-' + modules[step-1]).classList.add('active');
            for(let i=1; i<=step; i++) document.getElementById('dot-'+i).classList.add('active');
        }

        // --- ACTUAL INTEGRATIONS ---

        // 1. Metadata CSV Generator
        function finalizeRelease() {
            const data = {
                label: "Soul Dust Records",
                artist: document.getElementById('meta-artist').value,
                title: document.getElementById('meta-title').value,
                composers: document.getElementById('meta-legal').value,
                genre: document.getElementById('meta-genre').value
            };

            const csvRows = [
                "Label,Artist,Title,Composers,Genre",
                `${data.label},${data.artist},${data.title},"${data.composers}",${data.genre}`
            ];
            
            const blob = new Blob([csvRows.join("\n")], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${data.artist}_Metadata.csv`;
            a.click();
            alert("SDR AI: Metadata CSV generated and saved for Believe Digital.");
        }

        // 2. Real Smart Link Scraper (Odesli API)
        async function generateSmartLink() {
            const url = document.getElementById('sp-input').value;
            const btn = document.getElementById('scrape-btn');
            const resDiv = document.getElementById('link-results');

            if(!url.includes('spotify')) return alert("Please enter a valid Spotify link.");

            btn.innerText = "SCRAPING GLOBAL STORES...";
            resDiv.innerHTML = "";

            try {
                const response = await fetch(`https://api.song.link/v1-alpha.1/links?url=${encodeURIComponent(url)}`);
                const data = await response.json();
                
                resDiv.classList.remove('hidden');
                const platforms = ['appleMusic', 'deezer', 'youtube', 'tidal'];
                
                platforms.forEach(p => {
                    if(data.linksByPlatform[p]) {
                        resDiv.innerHTML += `
                            <div class="link-pill">
                                <span>${p.toUpperCase()}</span>
                                <a href="${data.linksByPlatform[p].url}" target="_blank" style="color:var(--gold)">VIEW STORE</a>
                            </div>`;
                    }
                });
                btn.innerText = "LINK GENERATED";
            } catch (err) {
                alert("API Error: Make sure this song is live on Spotify.");
                btn.innerText = "GENERATE MULTI-STORE LINK";
            }
        }

        // 3. AI Concierge Integration
        async function triggerAI() {
            const prompt = prompt("SDR AI: How can I help you today?");
            if(!prompt) return;

            if(CONFIG.OPENAI_KEY === "YOUR_KEY_HERE") {
                alert("AI Simulation: I have reviewed your metadata for " + document.getElementById('meta-artist').value + " and it looks perfect for registration.");
            } else {
                // Real OpenAI Fetch here if key is provided
            }
        }
    </script>
</body>
</html>
