<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDR Admin Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --drown-bg: #1a1412;
            --card-bg: #2a201d;
            --zulu-gold: #c5a059;
            --sunset: #b3592d;
        }
        body {
            background: linear-gradient(var(--drown-bg), #000);
            color: #f5f5f5;
            font-family: sans-serif;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid #3a2d29;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }
        input {
            background: #111;
            border: 1px solid #444;
            color: white;
            padding: 12px;
            width: 100%;
            border-radius: 5px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }
        button {
            background: var(--sunset);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 5px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
        }
        button:hover { background: var(--zulu-gold); color: black; }
        .hidden { display: none; }
        #list div {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            margin-top: 10px;
            border-radius: 8px;
            border-left: 4px solid var(--zulu-gold);
        }
        .status { color: var(--zulu-gold); font-size: 0.8rem; font-weight: bold; }
    </style>
</head>
<body>

    <h2 style="color: var(--zulu-gold); letter-spacing: 2px;">SOUL DUST RECORDS</h2>

    <!-- 🔒 ADMIN LOGIN -->
    <div id="admin-gate" class="card">
        <h3 style="text-align:center;">Admin Access</h3>
        <input type="password" id="master-key" placeholder="Enter Admin Key">
        <button onclick="checkAccess()">Enter Portal</button>
        <p style="font-size: 0.7rem; text-align: center; color: #666; margin-top: 15px;">
            Authorized Use Only: souldustrecords@gmail.com
        </p>
    </div>

    <!-- 📂 ADMIN DASHBOARD (Hidden by default) -->
    <div id="portal" class="hidden" style="width: 100%; max-width: 600px;">
        <div class="card">
            <h3>Direct Distribution Upload</h3>
            <p style="font-size: 0.8rem; color: #888;">File will be sent to SDR Cloud Storage.</p>
            <input type="file" id="file-input">
            <button id="upBtn" onclick="handleUpload()">Upload to SDR Vault</button>
        </div>

        <div class="card">
            <h3>Recent Label Submissions</h3>
            <div id="submissions-list">Loading vault data...</div>
        </div>
    </div>

<script>
    const _supabase = window.supabase.createClient(
        "https://tjebjlhgnhogkipzpbna.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRqZWJqbGhnbmhvZ2tpcHpwYm5hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwMDc2MTMsImV4cCI6MjA5MzU4MzYxM30.MYCp9CEqpNLMvPxFMU7RX6hUy1ZapxTBbDdI8MCzQxA"
    );

    // 1. SIMPLE ACCESS CONTROL
    function checkAccess() {
        const key = document.getElementById('master-key').value;
        // Set your own secret key here
        if (key === "SDR2026") { 
            document.getElementById('admin-gate').classList.add('hidden');
            document.getElementById('portal').classList.remove('hidden');
            loadAllSubmissions();
        } else {
            alert("Unauthorized Access Key.");
        }
    }

    // 2. ADMIN UPLOAD (Using your souldustrecords@gmail.com context)
    async function handleUpload() {
        const file = document.getElementById('file-input').files[0];
        const btn = document.getElementById('upBtn');
        if (!file) return alert("Select file first.");

        btn.innerText = "Syncing with Drive...";
        btn.disabled = true;

        const formData = new FormData();
        formData.append("file", file);

        try {
            const res = await fetch("https://tjebjlhgnhogkipzpbna.supabase.co/functions/v1/upload-to-drive", {
                method: "POST",
                body: formData
            });
            const data = await res.json();

            // Save record as Label Admin
            await _supabase.from("releases").insert([
                { 
                  file_url: data.link, 
                  status: "Admin Upload", 
                  label: "Soul Dust Records",
                  user_id: "ADMIN_SDR" // Tagging it as admin work
                }
            ]);

            alert("Upload Successful!");
            loadAllSubmissions();
        } catch (e) {
            alert("Error: " + e.message);
        } finally {
            btn.innerText = "Upload to SDR Vault";
            btn.disabled = false;
        }
    }

    // 3. VIEW ALL RELEASES (Admin View)
    async function loadAllSubmissions() {
        const list = document.getElementById('submissions-list');
        const { data, error } = await _supabase
            .from("releases")
            .select("*")
            .order('created_at', { ascending: false });

        if (error) return list.innerText = "Error accessing vault.";
        
        list.innerHTML = data.map(item => `
            <div>
                <span class="status">${item.status}</span><br>
                <small style="color:#aaa;">Catalog Reference: ${item.id.substring(0,8)}</small><br>
                <a href="${item.file_url}" target="_blank" style="color:var(--zulu-gold); font-size:0.8rem;">View File</a>
            </div>
        `).join("");
    }
</script>
</body>
</html>
