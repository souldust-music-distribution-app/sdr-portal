<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDR Elite | Artist Power Portal</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root { --gold: #c5a059; --bg: #050505; --panel: rgba(15, 15, 15, 0.95); }
        
        body {
            margin: 0; font-family: 'Segoe UI', Roboto, sans-serif; 
            background: #000 url('elephant 19.jpg') no-repeat center center fixed; 
            background-size: cover; color: white; min-height: 100vh;
            display: flex; flex-direction: column;
        }

        .main-container { display: flex; flex-wrap: wrap; gap: 20px; padding: 20px; max-width: 1400px; margin: auto; width: 100%; box-sizing: border-box; }
        .sidebar { flex: 1; min-width: 300px; background: var(--panel); border-radius: 20px; border: 1px solid rgba(197, 160, 89, 0.2); padding: 25px; height: fit-content; backdrop-filter: blur(10px); }
        .content-area { flex: 2; min-width: 350px; }
        .glass-panel { background: var(--panel); padding: 35px; border-radius: 24px; border: 1px solid rgba(197, 160, 89, 0.3); text-align: center; box-shadow: 0 25px 60px rgba(0,0,0,0.8); backdrop-filter: blur(10px); }

        h2 { color: var(--gold); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; font-size: 1.2rem; }
        
        /* Audio Player Styling */
        .player-container {
            background: rgba(255,255,255,0.05); border-radius: 15px; padding: 15px; margin: 20px 0;
            border: 1px solid var(--gold); display: none;
        }
        .player-container.active { display: block; }
        audio { width: 100%; filter: invert(100%) hue-rotate(180deg) brightness(1.5); height: 35px; }

        input, select { width: 100%; padding: 15px; margin-bottom: 10px; background: #000; border: 1px solid #222; color: white; border-radius: 12px; box-sizing: border-box; font-size: 0.9rem; }
        input:focus { border-color: var(--gold); outline: none; }
        
        .btn { width: 100%; padding: 18px; background: var(--gold); color: black; border: none; border-radius: 50px; font-weight: 900; cursor: pointer; transition: 0.4s; text-transform: uppercase; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(197, 160, 89, 0.3); }
        .secondary-btn { background: transparent; border: 1px solid #444; color: #888; font-size: 0.7rem; padding: 10px; margin-top: 5px; }

        .step { display: none; }
        .active-step { display: block; }
        .hidden { display: none !important; }

        /* Sidebar Tools */
        .tool-link { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 10px; margin-bottom: 8px; text-decoration: none; color: #eee; font-size: 0.85rem; transition: 0.3s; }
        .tool-link:hover { background: rgba(197, 160, 89, 0.1); color: var(--gold); }
        .price { font-weight: bold; color: var(--gold); }
    </style>
</head>
<body>

    <div id="login-screen" style="display: flex; justify-content: center; align-items: center; height: 100vh;">
        <div class="glass-panel" style="width: 400px;">
            <img src="Soul Dust.png" alt="SDR" style="height: 80px; margin-bottom: 20px;">
            <h2>PRO PORTAL LOGIN</h2>
            <input type="password" id="pass-key" placeholder="ENTER ACCESS KEY">
            <button class="btn" onclick="authenticate()">UNLOCK TOOLS</button>
        </div>
    </div>

    <div id="main-portal" class="main-container hidden">
        <div class="sidebar">
            <img src="Soul Dust.png" alt="SDR" style="height: 50px; margin-bottom: 20px;">
            <h2>OFFICIAL RATES</h2>
            <div class="tool-link"><span>Mixing & Mastering</span> <span class="price">R450</span></div>
            <div class="tool-link"><span>Graphic Design</span> <span class="price">R200</span></div>
            <div class="tool-link"><span>Studio (Per Hour)</span> <span class="price">R150</span></div>
            <h3>ARTIST RESOURCES</h3>
            <a href="https://portal.samro.org.za" target="_blank" class="tool-link">SAMRO Portal ↗</a>
            <a href="https://portal.capasso.co.za" target="_blank" class="tool-link">CAPASSO Portal ↗</a>
        </div>

        <div class="content-area">
            <div class="glass-panel">
                
                <div id="step-1" class="step active-step">
                    <h2>01. RELEASE METADATA</h2>
                    <p style="font-size: 0.8rem; color: #888; margin-bottom: 20px;">Enter details exactly as they should appear on Spotify/Apple Music.</p>
                    
                    <input type="text" id="artist-name" placeholder="MAIN ARTIST (e.g. Nontomby)">
                    <input type="text" id="feat-artist" placeholder="FEATURED ARTIST (Leave blank if none)">
                    <input type="text" id="track-title" placeholder="TRACK TITLE (e.g. Impumelelo)">
                    
                    <div style="display: flex; gap: 10px;">
                        <select id="genre" style="flex: 1;">
                            <option value="Afro House">Afro House</option>
                            <option value="Amapiano">Amapiano</option>
                            <option value="Gqom">Gqom</option>
                            <option value="Deep House">Deep House</option>
                        </select>
                        <input type="text" id="language" placeholder="Language (e.g. Zulu)" style="flex: 1;">
                    </div>

                    <input type="text" id="composers" placeholder="COMPOSERS (Full Legal Names)">
                    
                    <label style="display:block; text-align:left; font-size: 0.7rem; color:var(--gold); margin-top:10px;">COVER ARTWORK (3000x3000px JPG)</label>
                    <input type="file" id="file-cover" accept="image/*">

                    <button class="btn" onclick="next(2)">NEXT: AUDIO & PREVIEW</button>
                </div>

                <div id="step-2" class="step">
                    <h2>02. MASTER AUDIO SYNC</h2>
                    
                    <label style="display:block; text-align:left; font-size: 0.7rem; color:var(--gold);">UPLOAD MASTER WAV</label>
                    <input type="file" id="file-audio" accept=".wav" onchange="previewAudio(this)">

                    <div id="preview-box" class="player-container">
                        <span style="font-size: 0.7rem; color: var(--gold); font-weight: bold; display: block; margin-bottom: 5px;">🎵 PRE-DISTRIBUTION PREVIEW</span>
                        <audio id="audio-player" controls></audio>
                        <p id="file-info" style="font-size: 0.7rem; color: #888; margin-top: 5px;"></p>
                    </div>

                    <label style="display:block; text-align:left; font-size: 0.7rem; color:var(--gold); margin-top:10px;">SIGNED DEED OF ASSIGNMENT</label>
                    <input type="file" id="file-legal">

                    <button class="btn" id="sync-btn" onclick="uploadToSupabase()">PUSH TO SDR CLOUD</button>
                    <button class="btn secondary-btn" onclick="next(1)">← BACK TO METADATA</button>
                </div>

            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://tjebjlhgnhogkipzpbna.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRqZWJqbGhnbmhvZ2tpcHpwYm5hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwMDc2MTMsImV4cCI6MjA5MzU4MzYxM30.MYCp9CEqpNLMvPxFMU7RX6hUy1ZapxTBbDdI8MCzQxA";
        const SDR_PASS = "SDR2026";
        const sbClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function authenticate() {
            if(document.getElementById('pass-key').value === SDR_PASS) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-portal').classList.remove('hidden');
            } else { alert("ACCESS DENIED"); }
        }

        function next(s) {
            document.querySelectorAll('.step').forEach(el => el.classList.remove('active-step'));
            document.getElementById('step-' + s).classList.add('active-step');
        }

        // --- PREVIEW PLAYER LOGIC ---
        function previewAudio(input) {
            const player = document.getElementById('audio-player');
            const box = document.getElementById('preview-box');
            const info = document.getElementById('file-info');
            
            if (input.files && input.files[0]) {
                const file = input.files[0];
                const url = URL.createObjectURL(file);
                player.src = url;
                box.classList.add('active');
                info.innerText = `File: ${file.name} | Size: ${(file.size / 1048576).toFixed(2)} MB`;
            }
        }

        async function uploadToSupabase() {
            const btn = document.getElementById('sync-btn');
            const artist = document.getElementById('artist-name').value || "Unknown";
            const track = document.getElementById('track-title').value || "Untitled";
            
            const fileAudio = document.getElementById('file-audio').files[0];
            const fileCover = document.getElementById('file-cover').files[0];
            const fileLegal = document.getElementById('file-legal').files[0];

            if (!fileAudio || !fileCover || !fileLegal) return alert("Please upload Artwork, Audio and Legal files.");

            btn.disabled = true; btn.innerText = "SYNCING ASSETS...";

            // ADVANCED: We generate the metadata as a Virtual JSON file to save you Excel work
            const metaData = {
                label: "Soul Dust Records",
                artist: artist,
                feat: document.getElementById('feat-artist').value,
                title: track,
                genre: document.getElementById('genre').value,
                composers: document.getElementById('composers').value,
                language: document.getElementById('language').value,
                timestamp: new Date().toISOString()
            };

            try {
                const folderName = `${artist}-${track}`.replace(/\s+/g, '_');
                const timestamp = Date.now();

                // Upload Audio
                await sbClient.storage.from('distribution-uploads').upload(`releases/${folderName}/AUDIO_${timestamp}.wav`, fileAudio);
                // Upload Artwork
                await sbClient.storage.from('distribution-uploads').upload(`releases/${folderName}/ART_${timestamp}.jpg`, fileCover);
                // Upload Legal
                await sbClient.storage.from('distribution-uploads').upload(`releases/${folderName}/LEGAL_${timestamp}.pdf`, fileLegal);
                
                // Upload Metadata as a JSON file (This replaces the manual Excel sheet!)
                const metaBlob = new Blob([JSON.stringify(metaData, null, 2)], {type : 'application/json'});
                await sbClient.storage.from('distribution-uploads').upload(`releases/${folderName}/METADATA_${timestamp}.json`, metaBlob);

                btn.style.background = "#28a745"; btn.innerText = "RELEASE SECURED!";
                alert("SYCN COMPLETE: Your release is now in the SDR pipeline.");
            } catch (err) {
                alert("Error: " + err.message);
                btn.disabled = false; btn.innerText = "RETRY SYNC";
            }
        }
    </script>
</body>
</html>
